server {
    listen 80;
    root /var/www/html;
    index index.php;

    location = / {
        include fastcgi_params;
        fastcgi_pass php_app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/homepage/index.php;
    }

    location /app {
        alias /var/www/html/app;
        index index.php;
        try_files $uri $uri/ /app/index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass php_app:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

    location ~ \.php$ {
        fastcgi_pass php_app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        try_files $uri $uri/ /homepage/index.php?$query_string;
    }

    location = /manifest.json {
        types {
            application/manifest+json json;
        }
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=604800";
        try_files /app/manifest.json =404;
    }

    location = /sw.js {
        types {
            application/javascript js;
        }
        default_type application/javascript;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
        try_files /app/sw.js =404;
    }
}
