services:
  php_app:
    image: php:8.3-fpm
    restart: unless-stopped
    volumes:
      - ./frontend:/var/www/html
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  nginx_server:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3049:80"
    volumes:
      - ./frontend:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build: ./backend
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload
    restart: unless-stopped
    ports:
      - "4567:5000"
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      POCKETBASE_URL: ${POCKETBASE_URL:-http://pocketbase:8080}
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      SCRAPER_RSS_FEED_URL: ${SCRAPER_RSS_FEED_URL}
    volumes:
      - ./backend:/app

  scraper:
    build: ./backend
    working_dir: /app
    command: python run_scraper.py
    restart: unless-stopped
    ports:
      - "0987:5001"
    environment:
      POCKETBASE_URL: ${POCKETBASE_URL:-http://pocketbase:8080}
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      SCRAPER_TESTING_MODE: ${SCRAPER_TESTING_MODE:-true}
      SCRAPER_GOOGLE_SEARCH_QUERY: ${SCRAPER_GOOGLE_SEARCH_QUERY}
      SCRAPER_RSS_FEED_URL: ${SCRAPER_RSS_FEED_URL}
    volumes:
      - ./backend:/app
    depends_on:
      - pocketbase

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    ports:
      - "8080:8080"
    volumes:
      - ./pb_data:/pb_data
    command:
      - serve
      - --http=0.0.0.0:8080
      - --dir=/pb_data
    restart: unless-stopped
